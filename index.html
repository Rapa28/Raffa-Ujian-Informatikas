<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike Shox R4 OG 2025 Women's | FOOTLAB</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="container navbar">
            <div class="logo">FOOTLAB</div>
            <nav>
                <ul>
                    <li><a href="#">NEW ARRIVALS</a></li>
                    <li><a href="#">SNEAKERS</a></li>
                    <li><a href="#">APPAREL</a></li>
                </ul>
            </nav>
            <div class="search-bar">
                <input type="text" placeholder="Cari produk...">
            </div>
        </div>
    </header>

    <main class="container product-page">
        
        <div class="product-gallery">
            <img src="sepatu.jpg" alt="Nike Shox R4 OG 2025" id="main-image">
            <div class="thumbnails">
                <img src="sepatu.jpg" alt="Thumbnail 1" class="active">
                <img src="sepatu.jpg" alt="Thumbnail 2">
                <img src="sepatu.jpg" alt="Thumbnail 3">
            </div>
        </div>

        <div class="product-details">
            <p class="brand">Nike</p>
            <h1 class="product-title">Nike Shox R4 OG 2025 Women's (AR3565-011)</h1>
            
            <div class="price-container">
                <p class="price" id="current-price">IDR 2,999,000</p>
                <p class="old-price">IDR 3,332,222</p>
                <span class="discount-tag">SAVE 10%</span>
            </div>

            <div class="size-selection">
                <h3>Pilih Ukuran (US Women's 5-11)</h3>
                <div class="size-grid">
                    <button class="size-btn">5</button>
                    <button class="size-btn available active">5.5</button>
                    <button class="size-btn available">6</button>
                    <button class="size-btn available">6.5</button>
                    <button class="size-btn available">7</button>
                    <button class="size-btn unavailable">7.5</button>
                    <button class="size-btn available">8</button>
                    <button class="size-btn available">8.5</button>
                    <button class="size-btn available">9</button>
                    <button class="size-btn available">9.5</button>
                    <button class="size-btn available">10</button>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn-buy-now">BELI SEKARANG</button>
                <button class="btn-add-cart">TAMBAH KE KERANJANG</button>
            </div>

            <div class="extra-info">
                <p>✓ AUTHENTICITY GUARANTEED</p>
                <p>✓ ESTIMASI PENGIRIMAN: 1-3 Hari Kerja</p>
            </div>
            
            <div class="footlab-guarantee">
                <img src="logo_kecil.png" alt="Footlab Logo" class="guarantee-icon">
                <span>FOOTLAB Authenticity Program</span>
            </div>

        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
