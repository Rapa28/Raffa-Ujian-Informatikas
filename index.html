        body {

        .top-bar {

        .logo {

        .nav-menu {

            font-size: 14px;

        .nav-menu a:hover {

            padding: 8px 16px;

        .breadcrumb a {

        }

        .product-layout {

            gap: 40px;
        }

        .gallery-main img {

            color: #fff;

            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            border-radius: 4px;
            z-index: 10;
        }

        .gallery-thumbs {

            gap: 12px;
        }

        .thumb {

            height: 80px;

            align-items: center;
            justify-content: center;
        }

        .thumb.active {

        }

        .thumb img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .brand-name {
            font-size: 16px;
            text-transform: uppercase;
            font-weight: 700;
            color: #86868b;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .product-title {

            font-weight: 700;

            line-height: 1.2;

        }

        .style-code {

        }

            color: #86868b;
        }

        .price-amount {
            font-size: 26px;
            font-weight: 700;
            color: #000;
        }

        .price-note {

            color: #1d1d1f;
            background-color: #eafbf0;
            display: inline-block;

            border-radius: 4px;
            margin-top: 6px;
        }

        .size-section {

        }

        }

            flex-wrap: wrap;

        }
